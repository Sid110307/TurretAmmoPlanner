[item-name]
turret-ammo-planner=Turret Ammo Planner

[item-description]
turret-ammo-planner=Drag over ammo turrets to create bot item requests using the ammo/count configured in the planner GUI. Alt-select creates ammo removal requests.

[shortcut-name]
turret-ammo-planner-toggle-gui=Turret Ammo Planner

[shortcut-description]
turret-ammo-planner-toggle-gui=Open the Turret Ammo Planner GUI.

[controls]
turret-ammo-planner-toggle-gui=Open Turret Ammo Planner

[turret-ammo-planner]
gui-title=Turret Ammo Planner
ammo-label=Ammo item
count-label=Target count
quality-label=Quality
mode-label=Mode
mode-set=Set exactly: bots remove old ammo and deliver selected ammo/count
mode-top-up=Top up: bots deliver selected ammo until turret has at least count
mode-clear=Clear: bots remove turret ammo
give-planner=Put planner in cursor
close=Close
help=Open this GUI with Ctrl+Shift+T. Configure ammo/count/quality, put the planner in cursor, then drag over turrets. Alt-select always creates removal requests.
planner-added=Turret Ammo Planner added to inventory.
no-inventory-space=No inventory space for Turret Ammo Planner.
